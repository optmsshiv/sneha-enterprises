<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Sneha Enterprises</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/shared.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--cream);text-align:center;padding:2rem}
.wrap{max-width:560px}
.num{font-family:'Playfair Display',serif;font-size:120px;font-weight:700;line-height:1;background:linear-gradient(135deg,var(--navy),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.icon{font-size:48px;margin-bottom:16px;display:block}
h1{font-family:'Playfair Display',serif;font-size:28px;color:var(--navy);margin-bottom:12px}
p{font-size:15px;color:var(--text-light);line-height:1.75;margin-bottom:32px}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
</style>
</head>
<body>
<div class="wrap">
  <span class="icon">🌾</span>
  <div class="num">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
  <div class="btns">
    <a href="/" class="btn-navy" style="text-decoration:none;display:inline-flex;align-items:center;gap:8px"><i class="fa-solid fa-house"></i> Go Home</a>
    <a href="/pages/products" class="btn-gold" style="text-decoration:none;display:inline-flex;align-items:center;gap:8px"><i class="fa-solid fa-wheat-awn"></i> Our Products</a>
    <a href="/pages/contact" style="display:inline-flex;align-items:center;gap:8px;color:var(--navy);font-weight:600;font-size:14px;text-decoration:none;padding:13px 20px;border:1.5px solid var(--border);border-radius:8px"><i class="fa-solid fa-envelope"></i> Contact Us</a>
  </div>
</div>
</body>
</html>
